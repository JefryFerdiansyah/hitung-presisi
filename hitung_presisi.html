<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perhitungan PRESISI Timbangan Mingguan SEMISOLID</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* Reset Dasar */
* {
    box-sizing: border-box;
}

/* Menyamakan Background dan Font */
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    margin: 0;
    padding: 30px 20px;
    color: #333;
    min-height: 100vh;
}

/* Menyamakan bentuk Card / Wadah Kalkulator */
.container {
    background: rgba(255, 255, 255, 0.95);
    padding: 35px;
    max-width: 700px;
    width: 100%;
    margin: auto;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    border-top: 5px solid #007bff; /* Garis biru di atas card */
}

h2 {
    text-align: center;
    color: #2c3e50;
    margin-top: 0;
    font-weight: 700;
    font-size: 24px;
    margin-bottom: 20px;
}

/* Grid Kolom Input */
#inputs {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

/* Menyamakan Kolom Input & Dropdown */
input, select {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #dce1e6;
    border-radius: 8px;
    font-size: 15px;
    font-family: 'Poppins', sans-serif;
    background-color: #f8faff;
    transition: all 0.3s ease;
}

/* Efek saat Kolom Input diklik (Focus) */
input:focus, select:focus {
    border-color: #80bdff;
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,123,255,.25);
    background-color: #fff;
}

#pembagi {
    cursor: pointer;
    margin-bottom: 15px;
}

/* Menyamakan Tombol */
button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,123,255,0.3);
    font-family: 'Poppins', sans-serif;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(0,123,255,0.4);
}

/* Desain Tabel Menyamakan Tabel Acuan */
.table-wrapper {
    overflow-x: auto;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    border: 1px solid #eee;
    margin-top: 25px;
    margin-bottom: 25px;
    background: white;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th {
    background-color: #007bff;
    color: white;
    font-weight: 600;
    padding: 12px 10px;
}

th, td {
    padding: 12px 10px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background-color: #f8f9fa;
}

/* Desain Hasil (Menyamakan kotak hasil kalkulator tube) */
.result {
    background-color: #f1f8ff;
    padding: 15px 20px;
    border-radius: 8px;
    margin-top: 20px;
    border-left: 6px solid #28a745; /* Garis hijau di pinggir */
}

.hasil-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px dashed #ccc;
    font-size: 15px;
    color: #444;
}

.hasil-item:last-child {
    border-bottom: none;
}

.hasil-label {
    font-weight: 600;
}

.hasil-value {
    font-weight: 700;
    color: #222;
    font-family: 'Poppins', sans-serif; /* Mengganti font monospace */
}

/* Catatan Pengunjung Disesuaikan */
.catatan-pengunjung {
    background-color: #fff8e6;
    border: 1px solid #ffe08a;
    padding: 12px 16px;
    border-radius: 8px;
    font-family: 'Poppins', sans-serif;
    color: #7a5c00;
    font-size: 14px;
    margin-bottom: 20px;
    text-align: center;
}

.catatan-pengunjung strong {
    color: #b08100;
}

/* HP kecil */
@media(max-width:480px){
    #inputs{
        grid-template-columns: 1fr;
    }
}

/* Footer Info */
.footer-info {
    text-align: center;
    margin-top: 40px;
    font-size: 13px;
    color: #888;
}

/* Desain saat tombol sedang dikunci (disabled) */
button:disabled {
    background: #cccccc; /* Warna abu-abu */
    cursor: not-allowed; /* Kursor berubah jadi tanda dilarang */
    box-shadow: none;
    transform: none;
}

</style>
</head>

<body>

<div class="container">
<h2>Kalkulator Presisi <br> SEMISOLID</h2>
<div class="catatan-pengunjung">
    <strong>Catatan Penting:</strong> Pastikan Anda menggunakan TITIK (.) bukan KOMA (,) <br> Terima kasih.
</div>
    <br><br>

<div id="inputs"></div>

<p>
  <select id="pembagi" onchange="bukaKunciTombol()" required>
    <option value="" disabled selected>Pilih Berat Tiimbangan</option>
    <option value="100">100 gram</option>
    <option value="20">20 Kg</option>
  </select>
</p>

<button id="tombolHitung" onclick="hitung()" disabled>Hitung</button>

<div class="result">
    <div class="hasil-item">
        <div class="hasil-label">b (Rata-rata)</div>
        <div class="hasil-value" id="b"></div>
    </div>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>a</th>
<th>c = b-a</th>
<th>d = c²</th>
</tr>
</thead>
<tbody id="hasil"></tbody>
</table>
</div>

<div class="result">

    <div class="hasil-item">
        <div class="hasil-label">e (Σ d)</div>
        <div class="hasil-value" id="e"></div>
    </div>

    <div class="hasil-item">
        <div class="hasil-label">f (Varian)</div>
        <div class="hasil-value" id="f"></div>
    </div>

    <div class="hasil-item">
        <div class="hasil-label">g (√f)</div>
        <div class="hasil-value" id="g"></div>
    </div>

    <div class="hasil-item">
        <div class="hasil-label">h (Evaluasi)</div>
        <div class="hasil-value" id="h"></div>
    </div>
    
</div>
    <div class="footer-info">
        &copy; 2026 Jefry Ifah Ferdiansyah
    </div>
</div>

<script>
// buat 10 input otomatis
const inputs = document.getElementById("inputs");
for(let i=0;i<10;i++){
    inputs.innerHTML += `<input type="text" step="any" id="a${i}" placeholder="Hasil Timbang ${i+1}">`;
}

function truncate(num, decimalPlaces){
    let factor = Math.pow(10, decimalPlaces);
    return Math.trunc(num * factor) / factor;
}

function bukaKunciTombol() {
    // Ambil nilai dari dropdown
    let nilaiDropdown = document.getElementById("pembagi").value;
    let tombol = document.getElementById("tombolHitung");

    // Jika nilainya tidak kosong, maka tombol dinyalakan (disabled = false)
    if (nilaiDropdown !== "") {
        tombol.disabled = false;
    }
}

function hitung(){

    let a=[];

    for(let i=0;i<10;i++){
        let v=parseFloat(document.getElementById("a"+i).value);
        if(isNaN(v)){
            alert("Semua angka harus diisi!");
            return;
        }
        a.push(v);
    }

    // b = rata-rata
    let sum=a.reduce((x,y)=>x+y,0);
    let b = sum / 10;

    // truncate 3 angka tanpa pembulatan
    let bTrunc = Math.trunc(b * 1000) / 1000;

    document.getElementById("b").innerText = bTrunc.toFixed(3);
    let tbody=document.getElementById("hasil");
    tbody.innerHTML="";

    let e=0;

    for(let i=0;i<10;i++){

    // C truncate 3 angka tanpa pembulatan
    let c = truncate(bTrunc - a[i], 3);

    // D truncate 6 angka tanpa pembulatan
    let d = truncate(c * c, 6);

    e += d;

    tbody.innerHTML+=`
    <tr>
    <td>${a[i]}</td>
    <td>${c.toFixed(3)}</td>
    <td>${d.toFixed(6)}</td>
    </tr>
    `;
}

    // f = varian
    let f=e/10;

    // g = akar varian
    let g=Math.sqrt(f);

    // h = evaluasi
    let pembagi = parseFloat(document.getElementById("pembagi").value);

if (isNaN(pembagi) || pembagi === 0) {
    alert("Nilai pembagi harus diisi dan tidak boleh 0!");
    return;
}

let h = (2 * g / pembagi) * 100;

    document.getElementById("e").innerText=e.toFixed(6);
    document.getElementById("f").innerText=f.toFixed(7);
    document.getElementById("g").innerText=g.toFixed(7);
    document.getElementById("h").innerText=h.toFixed(7);
}
</script>
    
</body>
</html>
